<!DOCTYPE html>
<html lang="zh-CN" data-theme="sketch">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2048</title>
  <link rel="stylesheet" href="../../styles/common.css" />
  <link rel="stylesheet" href="2048.css?v=2" />
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <a class="back-link" href="../../index.html">&#8592; 返回</a>
      <span class="game-name">2048</span>
    </div>
    <div class="topbar-right">
      <div class="theme-switcher">
        <select id="theme-switcher" title="切换主题">
          <option value="dark">暗夜黑晶</option>
          <option value="flat">扁平多彩</option>
          <option value="neumorphism">新拟态</option>
          <option value="cyberpunk">赛博朋克</option>
          <option value="terminal">复古终端</option>
          <option value="material">Material You</option>
          <option value="vaporwave">蒸汽波</option>
          <option value="sketch">手绘温暖</option>
        </select>
      </div>
      <button id="btn-undo" type="button">撤销</button>
      <button id="btn-help" type="button" title="帮助 (?)">?</button>
      <button id="btn-new" type="button">新游戏</button>
    </div>
  </div>

  <main class="page">
    <section class="game-shell">
      <div class="game-head">
        <div class="headline">
          <div>
            <h1>2048</h1>
            <div class="status-text" id="status-text">进行中</div>
          </div>
          <div class="goal-chip" id="goal-chip">目标 2048</div>
        </div>
        <div class="metrics">
          <div class="metric">
            <span class="metric-label">分数</span>
            <strong id="score">0</strong>
          </div>
          <div class="metric">
            <span class="metric-label">最高分</span>
            <strong id="best">0</strong>
          </div>
          <div class="metric">
            <span class="metric-label">步数</span>
            <strong id="moves">0</strong>
          </div>
        </div>
      </div>

      <div class="stats-section">
        <section class="stats-panel">
          <div class="panel-head">
            <div>
              <h2>对局数据</h2>
              <div class="panel-subtitle">本地记录，按当前浏览器保存</div>
            </div>
          </div>
          <div class="stats-grid">
            <div class="stats-item">
              <span class="stats-label">开局</span>
              <strong id="stats-started">0</strong>
            </div>
            <div class="stats-item">
              <span class="stats-label">达成 2048</span>
              <strong id="stats-won">0</strong>
            </div>
            <div class="stats-item">
              <span class="stats-label">胜率</span>
              <strong id="stats-win-rate">0%</strong>
            </div>
            <div class="stats-item">
              <span class="stats-label">最佳得分</span>
              <strong id="stats-best-score">-</strong>
            </div>
            <div class="stats-item">
              <span class="stats-label">最高块</span>
              <strong id="stats-best-tile">-</strong>
            </div>
            <div class="stats-item">
              <span class="stats-label">最快达成</span>
              <strong id="stats-best-time">-</strong>
            </div>
          </div>
        </section>

        <section class="stats-panel recent-panel">
          <div class="panel-head">
            <div>
              <h2>近期战绩</h2>
              <div class="panel-subtitle">只记录已结束的对局</div>
            </div>
          </div>
          <div class="recent-list" id="recent-list"></div>
        </section>
      </div>

      <div class="board-wrap">
        <div class="board" id="board" aria-label="2048 棋盘">
          <div class="board-grid" id="board-grid" aria-hidden="true"></div>
          <div class="tile-layer" id="tile-layer" aria-live="polite"></div>
        </div>
      </div>
    </section>
  </main>

  <div class="overlay" id="overlay" hidden>
    <div class="overlay-card">
      <div class="overlay-title" id="overlay-title"></div>
      <div class="overlay-scoreline" id="overlay-scoreline"></div>
      <div class="overlay-actions">
        <button id="overlay-undo" type="button" hidden>撤销一步</button>
        <button id="overlay-continue" type="button" hidden>继续</button>
        <a class="overlay-link" id="overlay-home" href="../../index.html">返回首页</a>
        <button id="overlay-new" type="button">再来一局</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="help-overlay" hidden>
    <div class="overlay-card">
      <div class="overlay-title">帮助</div>
      <div class="help-section">
        <div class="help-section-title">游戏规则</div>
        <div class="help-rules">
          <p>使用 <strong>方向键</strong> 或 <strong>滑动</strong> 来移动所有方块。</p>
          <p>相同数字的方块碰撞时会<strong>合并</strong>（如 2+2=4，4+4=8）。</p>
          <p>每次移动后，空白处会随机出现一个 2 或 4。</p>
          <p>目标是拼出<strong>2048</strong>；当无法移动时游戏结束。</p>
        </div>
      </div>
      <div class="help-section">
        <div class="help-section-title">快捷键</div>
        <div class="help-content">
          <div class="help-row"><kbd>方向键 / WASD / HJKL</kbd><span>移动方块</span></div>
          <div class="help-row"><kbd>R</kbd><span>新游戏</span></div>
          <div class="help-row"><kbd>U / Ctrl+Z</kbd><span>撤销一步</span></div>
          <div class="help-row"><kbd>?</kbd><span>打开帮助</span></div>
          <div class="help-row"><kbd>ESC</kbd><span>关闭弹窗</span></div>
        </div>
      </div>
      <div class="overlay-actions">
        <button id="help-close" type="button">知道了</button>
      </div>
    </div>
  </div>

  <script src="../../scripts/theme.js"></script>
  <script src="2048.js?v=2"></script>
</body>
</html>
